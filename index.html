    function getMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return hours * 60 + minutes;
    }

    function formatDuration(start, end) {
      const diff = Math.max(0, getMinutes(end) - getMinutes(start));
      const hours = Math.floor(diff / 60);
      const minutes = diff % 60;
      if (hours && minutes) return `${hours}h ${minutes}m`;
      if (hours) return `${hours}h`;
      return `${minutes}m`;
    }

    function formatCurrency(value) {
      if (value === "" || value === null || value === undefined) return "—";
      return new Intl.NumberFormat("it-IT", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0,
      }).format(Number(value) || 0);
    }

    function formatDateLabel(dateString) {
      const date = new Date(`${dateString}T12:00:00`);
      return date.toLocaleDateString("it-IT", {
        weekday: "long",
        day: "2-digit",
        month: "long",
      });
    }

    function getMonthLabel(dateString) {
      const date = new Date(`${dateString}T12:00:00`);
      return date.toLocaleDateString("it-IT", {
        month: "long",
        year: "numeric",
      });
    }

    function formatMonthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function toDateString(dateObj) {
      return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, "0")}-${String(dateObj.getDate()).padStart(2, "0")}`;
    }

    function parseStored(key, fallback) {
      if (typeof window === "undefined") return fallback;
      try {
        const raw = window.localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function loadInitialArray(key, fallback) {
      const stored = parseStored(key, null);
      if (!Array.isArray(stored) || stored.length === 0) return fallback;
      return stored;
    }

    function getMonthMatrix(currentMonthDate) {
      const firstDay = new Date(currentMonthDate.getFullYear(), currentMonthDate.getMonth(), 1);
      const startWeekDay = (firstDay.getDay() + 6) % 7;
      const gridStart = new Date(firstDay);
      gridStart.setDate(firstDay.getDate() - startWeekDay);

      const days = [];
      for (let i = 0; i < 42; i += 1) {
        const day = new Date(gridStart);
        day.setDate(gridStart.getDate() + i);
        days.push(day);
      }

      const weeks = [];
      for (let i = 0; i < days.length; i += 7) {
        weeks.push(days.slice(i, i + 7));
      }
      return weeks;
    }

    function getMonthStats(appointments) {
      const grouped = appointments.reduce((acc, item) => {
        const month = getMonthLabel(item.date);
        if (!acc[month]) acc[month] = [];
        acc[month].push(item);
        return acc;
      }, {});

      return Object.entries(grouped).map(([month, items]) => {
        const totalMinutes = items.reduce(
          (acc, item) => acc + Math.max(0, getMinutes(item.end) - getMinutes(item.start)),
          0
        );
        const totalCompensation = items.reduce(
          (acc, item) => acc + (Number(item.compensation) || 0),
          0
        );
        return {
          month,
          count: items.length,
          totalHours: (totalMinutes / 60).toFixed(totalMinutes % 60 === 0 ? 0 : 1),
          totalCompensation,
        };
      });
    }

    function createMapsLink(address) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address || "")}`;
    }

    function createCalendarLink(item) {
      const start = `${item.date.replace(/-/g, "")}T${item.start.replace(":", "")}00`;
      const end = `${item.date.replace(/-/g, "")}T${item.end.replace(":", "")}00`;
      const text = encodeURIComponent(`${item.facility} - Turno Elisa`);
      const details = encodeURIComponent(item.notes || "Impegno di lavoro");
      const location = encodeURIComponent(item.address || item.location || item.facility);
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${start}/${end}&details=${details}&location=${location}`;
    }

    function MobileSection({ show, children }) {
      if (!show) return null;
      return <>{children}</>;
    }

    function ElisaPlannerApp() {
      const now = new Date();

      const [appointments, setAppointments] = useState(defaultAppointments);
      const [checklist, setChecklist] = useState(defaultChecklist);
      const [facilities, setFacilities] = useState(defaultFacilities);
      const [selectedDate, setSelectedDate] = useState(toDateString(now));
      const [searchText, setSearchText] = useState("");
      const [monthFilter, setMonthFilter] = useState("all");
      const [facilityFilter, setFacilityFilter] = useState("all");
      const [currentMonth, setCurrentMonth] = useState(
        new Date(now.getFullYear(), now.getMonth(), 1, 12, 0, 0)
      );
      const [messageIndex, setMessageIndex] = useState(0);
      const [activeTab, setActiveTab] = useState("today");
      const [currentNow, setCurrentNow] = useState(new Date());

      const [form, setForm] = useState({
        date: toDateString(now),
        facilityId: "",
        facility: "",
        location: "",
        address: "",
        phone: "",
        start: "08:00",
        end: "13:00",
        notes: "",
        compensation: "",
        reminderDayBefore: true,
        reminderOneHourBefore: true,
      });

      const [facilityForm, setFacilityForm] = useState({
        name: "",
        location: "",
        address: "",
        phone: "",
        contactPerson: "",
        averageTravelTime: "",
        color: "rose",
        notes: "",
      });

      useEffect(() => {
        setAppointments(loadInitialArray(STORAGE_KEYS.appointments, defaultAppointments));
        setChecklist(loadInitialArray(STORAGE_KEYS.checklist, defaultChecklist));
        setFacilities(loadInitialArray(STORAGE_KEYS.facilities, defaultFacilities));
        setMessageIndex(new Date().getDate() % dailyMessages.length);
      }, []);

      useEffect(() => {
        const timer = window.setInterval(() => {
          setCurrentNow(new Date());
        }, 60000);
        return () => window.clearInterval(timer);
      }, []);

      useEffect(() => {
        window.localStorage.setItem(STORAGE_KEYS.appointments, JSON.stringify(appointments));
      }, [appointments]);

      useEffect(() => {
        window.localStorage.setItem(STORAGE_KEYS.checklist, JSON.stringify(checklist));
      }, [checklist]);

      useEffect(() => {
        window.localStorage.setItem(STORAGE_KEYS.facilities, JSON.stringify(facilities));
      }, [facilities]);

      const today = useMemo(() => toDateString(currentNow), [currentNow]);

      const currentTimeLabel = useMemo(() => {
        return currentNow.toLocaleTimeString("it-IT", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }, [currentNow]);

      const appointmentMonths = useMemo(
        () => Array.from(new Set(appointments.map((item) => getMonthLabel(item.date)))),
        [appointments]
      );

      const filteredAppointments = useMemo(() => {
        return appointments
          .filter((item) => {
            const matchText =
              !searchText ||
              [item.facility, item.location, item.address, item.notes]
                .join(" ")
                .toLowerCase()
                .includes(searchText.toLowerCase());

            const matchMonth =
              monthFilter === "all" || getMonthLabel(item.date) === monthFilter;

            const matchFacility =
              facilityFilter === "all" || item.facility === facilityFilter;

            return matchText && matchMonth && matchFacility;
          })
          .sort((a, b) => `${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`));
      }, [appointments, searchText, monthFilter, facilityFilter]);

      const selectedDayAppointments = useMemo(() => {
        return appointments
          .filter((item) => item.date === selectedDate)
          .sort((a, b) => getMinutes(a.start) - getMinutes(b.start));
      }, [appointments, selectedDate]);

      const todayAppointments = useMemo(() => {
        return appointments
          .filter((item) => item.date === today)
          .sort((a, b) => getMinutes(a.start) - getMinutes(b.start));
      }, [appointments, today]);

      const nextAppointment = useMemo(() => {
        const nowKey = `${today} ${String(currentNow.getHours()).padStart(2, "0")}:${String(
          currentNow.getMinutes()
        ).padStart(2, "0")}`;

        return appointments
          .filter((item) => `${item.date} ${item.start}` >= nowKey)
          .sort((a, b) => `${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`))[0];
      }, [appointments, today, currentNow]);

      const monthStats = useMemo(() => getMonthStats(appointments), [appointments]);

      const globalStats = useMemo(() => {
        const totalMinutes = appointments.reduce(
          (acc, item) => acc + Math.max(0, getMinutes(item.end) - getMinutes(item.start)),
          0
        );
        const totalCompensation = appointments.reduce(
          (acc, item) => acc + (Number(item.compensation) || 0),
          0
        );
        return {
          days: appointments.length,
          hours: (totalMinutes / 60).toFixed(totalMinutes % 60 === 0 ? 0 : 1),
          compensation: totalCompensation,
          facilities: new Set(appointments.map((item) => item.facility)).size,
        };
      }, [appointments]);

      const currentMonthAppointments = useMemo(() => {
        const currentKey = formatMonthKey(currentMonth);
        return appointments.filter((item) => item.date.slice(0, 7) === currentKey);
      }, [appointments, currentMonth]);

      const calendarWeeks = useMemo(() => getMonthMatrix(currentMonth), [currentMonth]);

      const facilityPerformance = useMemo(() => {
        return facilities
          .map((facility) => {
            const related = appointments.filter((item) => item.facility === facility.name);
            const totalMinutes = related.reduce(
              (acc, item) => acc + Math.max(0, getMinutes(item.end) - getMinutes(item.start)),
              0
            );
            const totalCompensation = related.reduce(
              (acc, item) => acc + (Number(item.compensation) || 0),
              0
            );
            return {
              ...facility,
              count: related.length,
              hours: (totalMinutes / 60).toFixed(totalMinutes % 60 === 0 ? 0 : 1),
              totalCompensation,
            };
          })
          .sort((a, b) => {
            if (b.count !== a.count) return b.count - a.count;
            return a.name.localeCompare(b.name);
          });
      }, [appointments, facilities]);

      const addFacility = () => {
        if (!facilityForm.name.trim() || !facilityForm.address.trim()) return;

        const newFacility = {
          id: Date.now(),
          ...facilityForm,
        };

        setFacilities((current) => [...current, newFacility]);

        setForm((current) => ({
          ...current,
          facilityId: String(newFacility.id),
          facility: newFacility.name,
          location: newFacility.location,
          address: newFacility.address,
          phone: newFacility.phone,
          notes: current.notes || newFacility.notes || "",
        }));

        setFacilityForm({
          name: "",
          location: "",
          address: "",
          phone: "",
          contactPerson: "",
          averageTravelTime: "",
          color: "rose",
          notes: "",
        });
      };

      const applyFacilityToForm = (facilityId) => {
        const found = facilities.find((item) => String(item.id) === String(facilityId));
        setForm((current) => ({
          ...current,
          facilityId,
          facility: found ? found.name : "",
          location: found ? found.location : "",
          address: found ? found.address : "",
          phone: found ? found.phone : "",
          notes: current.notes || (found ? found.notes : "") || "",
        }));
      };

      const addAppointment = () => {
        if (!form.date || !form.facility.trim() || !form.location.trim()) return;

        const newAppointment = {
          id: Date.now(),
          ...form,
          compensation: form.compensation === "" ? "" : Number(form.compensation) || 0,
        };

        setAppointments((current) =>
          [...current, newAppointment].sort((a, b) =>
            `${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`)
          )
        );

        setSelectedDate(form.date);
        setActiveTab("calendar");

        setForm((current) => ({
          ...current,
          start: "08:00",
          end: "13:00",
          notes: "",
          compensation: "",
        }));
      };

      const duplicateAppointment = (item) => {
        const nextDate = new Date(`${item.date}T12:00:00`);
        nextDate.setDate(nextDate.getDate() + 7);

        const duplicated = {
          ...item,
          id: Date.now(),
          date: nextDate.toISOString().slice(0, 10),
          notes: item.notes ? `${item.notes} (duplicato)` : "Duplicato rapido",
        };

        setAppointments((current) =>
          [...current, duplicated].sort((a, b) =>
            `${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`)
          )
        );
      };

      const deleteAppointment = (id) => {
        setAppointments((current) => current.filter((item) => item.id !== id));
      };

      const removeFacility = (id) => {
        const facility = facilities.find((item) => item.id === id);
        if (!facility) return;

        setFacilities((current) => current.filter((item) => item.id !== id));
        setAppointments((current) =>
          current.filter((item) => item.facility !== facility.name)
        );
      };

      const toggleChecklist = (id) => {
        setChecklist((current) =>
          current.map((item) =>
            item.id === id ? { ...item, done: !item.done } : item
          )
        );
      };

      const resetChecklist = () => {
        setChecklist((current) => current.map((item) => ({ ...item, done: false })));
      };

      const exportMonthlySummary = () => {
        const rows = currentMonthAppointments
          .sort((a, b) => `${a.date} ${a.start}`.localeCompare(`${b.date} ${b.start}`))
          .map(
            (item) =>
              `${formatDateLabel(item.date)} | ${item.facility} | ${item.location || "—"} | ${item.start}-${item.end} | ${formatCurrency(item.compensation)}`
          );

        const totalComp = currentMonthAppointments.reduce(
          (acc, item) => acc + (Number(item.compensation) || 0),
          0
        );

        const summary = [
          `Planner Elisa - ${currentMonth.toLocaleDateString("it-IT", {
            month: "long",
            year: "numeric",
          })}`,
          "",
          ...rows,
          "",
          `Totale incarichi: ${currentMonthAppointments.length}`,
          `Totale compensi: ${formatCurrency(totalComp)}`,
        ].join("\n");

        const blob = new Blob([summary], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `riepilogo-${formatMonthKey(currentMonth)}.txt`;
        link.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-rose-50 via-white to-slate-100 text-slate-800">
          <div className="mx-auto max-w-md px-4 pb-32 pt-4 sm:max-w-lg">
            <header className="sticky top-0 z-30 mb-4 rounded-[1.75rem] bg-white/90 p-4 shadow-sm ring-1 ring-rose-100 backdrop-blur">
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <div className="inline-flex items-center gap-2 rounded-full bg-rose-100 px-3 py-1 text-xs font-medium text-rose-700">
                    <Heart className="h-3.5 w-3.5" /> Planner Elisa
                  </div>
                  <h1 className="mt-3 text-2xl font-semibold tracking-tight text-slate-900">
                    Agenda iPhone-first
                  </h1>
                  <p className="mt-1 text-sm leading-6 text-slate-600">
                    Semplice, veloce, pensata per essere usata solo da iPhone.
                  </p>
                </div>
                <button
                  onClick={() => setActiveTab("add")}
                  className="rounded-2xl bg-slate-900 p-3 text-white shadow-sm"
                  aria-label="Aggiungi impegno"
                >
                  <Plus className="h-5 w-5" />
                </button>
              </div>

              <div className="mt-4 rounded-2xl bg-slate-900 px-4 py-3 text-sm text-white">
                <div className="inline-flex items-center gap-2 text-rose-200">
                  <Sparkles className="h-4 w-4" />
                  <span>{dailyMessages[messageIndex]}</span>
                </div>
              </div>
            </header>

            <MobileSection show={activeTab === "today"}>
              <div className="space-y-4">
                <section className="rounded-[1.75rem] bg-white p-4 shadow-sm ring-1 ring-slate-200">
                  <div className="grid grid-cols-2 gap-3">
                    <div className="rounded-2xl bg-rose-50 p-4 ring-1 ring-rose-100">
                      <div className="text-xs text-slate-500">Giornate</div>
                      <div className="mt-1 text-2xl font-semibold">{globalStats.days}</div>
                    </div>
                    <div className="rounded-2xl bg-emerald-50 p-4 ring-1 ring-emerald-100">
                      <div className="text-xs text-slate-500">Compensi</div>
                      <div className="mt-1 text-lg font-semibold">
                        {new Intl.NumberFormat("it-IT", {
                          style: "currency",
                          currency: "EUR",
                          maximumFractionDigits: 0,
                        }).format(globalStats.compensation || 0)}
                      </div>
                    </div>
                  </div>
                </section>

                <section className="rounded-[1.75rem] bg-white p-4 shadow-sm ring-1 ring-slate-200">
                  <div className="flex items-center gap-3">
                    <Home className="h-5 w-5 text-rose-500" />
                    <div>
                      <h2 className="text-xl font-semibold text-slate-900">Oggi</h2>
                      <p className="text-sm capitalize text-slate-500">
                        {formatDateLabel(today)} · {currentTimeLabel}
                      </p>
                    </div>
                  </div>

                  <div className="mt-4 space-y-3">
                    {todayAppointments.length > 0 ? (
                      todayAppointments.map((item) => (
                        <div key={item.id} className="rounded-2xl bg-slate-50 p-4 ring-1 ring-slate-200">
                          <div className="text-lg font-semibold text-slate-900">{item.facility}</div>
                          <div className="mt-1 flex items-center gap-2 text-sm text-slate-500">
                            <MapPin className="h-4 w-4" />
                            <span>{item.address || item.location || "Nessun indirizzo inserito"}</span>
                          </div>
                          <div className="mt-2 flex flex-wrap gap-3 text-sm font-medium text-slate-700">
                            <span className="inline-flex items-center gap-1">
                              <Clock3 className="h-4 w-4" />
                              {item.start} – {item.end}
                            </span>
                            <span className="inline-flex items-center gap-1">
                              <Euro className="h-4 w-4" />
                              {formatCurrency(item.compensation)}
                            </span>
                          </div>
                          {item.notes ? (

                </section>

                <section className="rounded-[1.75rem] bg-gradient-to-br from-slate-900 to-slate-800 p-4 text-white shadow-sm">
                  <div className="inline-flex items-center gap-2 rounded-full bg-white/10 px-3 py-1 text-sm font-medium text-rose-200">
                    <Heart className="h-4 w-4" /> Nota personale
                  </div>
                  <p className="mt-4 text-base leading-8 text-slate-100">
                    Questo planner è anche una piccola dedica per te, Elisa. So quanto lavori, quanta energia metti ogni giorno nel prenderti cura degli altri. Spero che questa app possa renderti le giornate un po’ più leggere e ordinate. Con amore, Danny.
                  </p>
                </section>
              </div>
            </MobileSection>

            <nav className="fixed bottom-0 left-0 right-0 z-40 border-t border-slate-200 bg-white/95 px-2 pb-[calc(env(safe-area-inset-bottom)+8px)] pt-2 backdrop-blur">
              <div className="mx-auto grid max-w-md grid-cols-5 gap-1">
                {tabs.map((tab) => {
                  const Icon = tab.icon;
                  const active = activeTab === tab.key;

                  return (
                    <button
                      key={tab.key}
                      onClick={() => setActiveTab(tab.key)}
                      className={`flex flex-col items-center justify-center gap-1 rounded-2xl px-2 py-3 text-[11px] font-medium transition ${
                        active ? "bg-slate-900 text-white" : "text-slate-500"
                      }`}
                    >
                      <Icon className="h-5 w-5" />
                      <span>{tab.label}</span>
                    </button>
                  );
                })}
              </div>
            </nav>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ElisaPlannerApp />);
  </script>
</body>
</html>
